name: release-screenshots

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.11.0)'
        required: true
        default: 'v1.11.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Capture release screenshots
        run: |
          chmod +x .github/scripts/capture-screenshots.sh
          .github/scripts/capture-screenshots.sh /tmp/release-screenshots

      - name: Generate release notes
        id: notes
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          chmod +x .github/scripts/release-notes.sh
          {
            echo 'body<<EOF'
            .github/scripts/release-notes.sh "${{ inputs.tag }}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: Release ${{ inputs.tag }}
          body: ${{ steps.notes.outputs.body }}
          files: /tmp/release-screenshots/*.png
          overwrite_files: true
