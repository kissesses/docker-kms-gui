name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: kms
            file: Dockerfile.kms
            image: kms
          - name: gui
            file: Dockerfile
            image: kms-gui

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if push is enabled
        id: push
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: steps.push.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: ${{ steps.push.outputs.enabled == 'true' }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.tag }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  security-scan:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - file: Dockerfile.kms
            image: kms
          - file: Dockerfile
            image: kms-gui
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build image for scan
        run: docker build -f ${{ matrix.file }} -t scan:${{ matrix.image }} .

      - name: Scan image with Grype
        id: grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: scan:${{ matrix.image }}
          fail-build: false
          output-format: table
          severity-cutoff: high
          only-fixed: true
          cache-db: true

      - name: Generate SARIF report
        id: sarif
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: scan:${{ matrix.image }}
          fail-build: false
          output-format: sarif
          output-file: grype-${{ matrix.image }}.sarif
          severity-cutoff: high
          only-fixed: true
          cache-db: true

      - name: Upload SARIF to GitHub Security
        if: always() && steps.sarif.outputs.sarif != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: grype-${{ matrix.image }}.sarif
          category: grype-${{ matrix.image }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, security-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Resolve version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Capture release screenshots
        run: |
          chmod +x .github/scripts/capture-screenshots.sh
          .github/scripts/capture-screenshots.sh screenshots

      - name: Verify screenshots
        run: |
          test -f screenshots/dashboard.png
          test -f screenshots/clients.png
          test -f screenshots/setup.png
          test -f screenshots/admin-activations.png
          ls -la screenshots/

      - name: Generate release notes
        id: notes
        env:
          INCLUDE_SCREENSHOTS: '1'
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          chmod +x .github/scripts/release-notes.sh
          {
            echo 'body<<EOF'
            .github/scripts/release-notes.sh "${{ steps.version.outputs.tag }}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.body }}
          fail_on_unmatched_files: false
          files: |
            screenshots/dashboard.png
            screenshots/dashboard-light.png
            screenshots/clients.png
            screenshots/products.png
            screenshots/setup.png
            screenshots/admin-activations.png
