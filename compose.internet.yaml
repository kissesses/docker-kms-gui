# Internet deployment — KMS + GUI public with application login
#
# Usage:
#   cp .env.internet.example .env
#   # mount TLS certs to ./certs/ (cert.pem + key.pem)
#   docker compose -f compose.internet.yaml up -d
#   open https://your-domain/setup — create admin on first visit

name: kms-internet

services:
  kms:
    build:
      context: .
      dockerfile: Dockerfile.kms
      args:
        BUILD_VERSION: ${KMS_VERSION:-1.9.0}
    image: ghcr.io/kissesses/kms:${KMS_VERSION:-1.9.0}
    environment:
      TZ: ${TZ:-UTC}
      LOGLEVEL: ${KMS_LOGLEVEL:-INFO}
      IP: 0.0.0.0
      PORT: 1688
    volumes:
      - kms-data:/kms/var
    ports:
      - "${KMS_BIND:-0.0.0.0}:${KMS_PORT:-1688}:1688/tcp"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "pykms_Server.py"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  gui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_VERSION: ${GUI_VERSION:-1.9.0}
    image: ghcr.io/kissesses/kms-gui:${GUI_VERSION:-1.9.0}
    depends_on:
      kms:
        condition: service_healthy
    environment:
      TZ: ${TZ:-UTC}
      INTERNET_MODE: "true"
      GUI_AUTH_ENABLED: ${GUI_AUTH_ENABLED:-true}
      API_AUTH_REQUIRED: "true"
      OPS_DOCKER_ENABLED: ${OPS_DOCKER_ENABLED:-true}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      NGINX_ENABLED: "true"
      NGINX_PORT: "80"
      NGINX_TLS_ENABLED: ${NGINX_TLS_ENABLED:-true}
    volumes:
      - kms-data:/kms/var
      - ${TLS_CERT_DIR:-./certs}:/etc/nginx/certs:ro
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:ro
    ports:
      - "${GUI_BIND:-0.0.0.0}:${GUI_PORT:-443}:443/tcp"
      - "${GUI_BIND:-0.0.0.0}:80:80/tcp"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 90s
    security_opt:
      - no-new-privileges:true

volumes:
  kms-data:
