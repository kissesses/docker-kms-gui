{% extends 'auth_base.html' %}

{% block title %}Sign in · KMS-GUI{% endblock %}
{% block auth_subtitle %}Sign in{% endblock %}

{% block content %}
<h1 class="auth-title">Welcome back</h1>
<p class="auth-desc">Sign in to access the KMS administration panel.</p>

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<form method="post" class="auth-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <input type="hidden" name="next" value="{{ next_url }}">

    <label class="form-label" for="username">Username</label>
    <input class="input form-input" type="text" id="username" name="username" required autocomplete="username" autofocus>

    <label class="form-label" for="password">Password</label>
    <input class="input form-input" type="password" id="password" name="password" required autocomplete="current-password">

    <label class="form-check">
        <input type="checkbox" name="remember" value="on">
        <span>Remember me for 7 days</span>
    </label>

    <button type="submit" class="btn btn-primary auth-submit">Sign in</button>
</form>
{% endblock %}
