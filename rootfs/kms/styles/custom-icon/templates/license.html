{% extends 'base.html' %}

{% block title %}{{ t('license.title') }} · KMS-GUI{% endblock %}

{% block content %}
<div class="page-header">
    <div class="page-header-row">
        <div>
            <h1 class="page-title">{{ t('license.title') }}</h1>
            <p class="page-subtitle">{{ t('license.subtitle') }}</p>
        </div>
    </div>
</div>

<div class="license-panel">
    <pre class="license-pre">{{ license }}</pre>
</div>
{% endblock %}

{% block scripts %}
<script>document.addEventListener('DOMContentLoaded', function() { PyKmsApp.initCommon(); });</script>
{% endblock %}
