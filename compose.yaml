name: kms

services:
  kms:
    build:
      context: .
      dockerfile: Dockerfile.kms
      args:
        BUILD_VERSION: ${KMS_VERSION:-1.5.0}
    image: ghcr.io/kissesses/kms:${KMS_VERSION:-1.5.0}
    environment:
      TZ: ${TZ:-UTC}
      LOGLEVEL: ${KMS_LOGLEVEL:-INFO}
      IP: 0.0.0.0
      PORT: 1688
    volumes:
      - kms-data:/kms/var
    ports:
      - "${KMS_PORT:-1688}:1688/tcp"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "pykms_Server.py"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  gui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_VERSION: ${GUI_VERSION:-1.5.0}
    image: ghcr.io/kissesses/kms-gui:${GUI_VERSION:-1.5.0}
    depends_on:
      kms:
        condition: service_healthy
    environment:
      TZ: ${TZ:-UTC}
      NGINX_ENABLED: ${NGINX_ENABLED:-true}
      NGINX_PORT: "80"
      NGINX_BASIC_AUTH_USER: ${NGINX_BASIC_AUTH_USER:-}
      NGINX_BASIC_AUTH_PASS: ${NGINX_BASIC_AUTH_PASS:-}
      NGINX_TLS_ENABLED: ${NGINX_TLS_ENABLED:-false}
      KMS_GUI_STYLE: ${KMS_GUI_STYLE:-custom-icon}
      DEBUG: ${DEBUG:-}
    volumes:
      - kms-data:/kms/var
    ports:
      - "${GUI_PORT:-80}:80/tcp"
    restart: unless-stopped

volumes:
  kms-data:
