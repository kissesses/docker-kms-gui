# KMS + GUI — one stack for local, LAN, and internet (configure via .env)
#
#   cp .env.example .env
#   ./scripts/install.sh --mode local|lan|internet
#   docker compose up -d

name: kms

services:
  kms:
    build:
      context: .
      dockerfile: Dockerfile
      target: kms
      args:
        BUILD_VERSION: ${KMS_VERSION:-1.12.0}
    image: ghcr.io/kissesses/kms:${KMS_VERSION:-1.12.0}
    environment:
      TZ: ${TZ:-UTC}
      LOGLEVEL: ${KMS_LOGLEVEL:-INFO}
      IP: 0.0.0.0
      PORT: 1688
      CLIENT_COUNT: ${KMS_CLIENT_COUNT:-26}
      ACTIVATION_INTERVAL: ${KMS_ACTIVATION_INTERVAL:-120}
      RENEWAL_INTERVAL: ${KMS_RENEWAL_INTERVAL:-10080}
      HWID: ${KMS_HWID:-RANDOM}
    volumes:
      - kms-data:/kms/var
    ports:
      - "${KMS_BIND:-127.0.0.1}:${KMS_PORT:-1688}:1688/tcp"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "pykms_Server.py"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  gui:
    build:
      context: .
      dockerfile: Dockerfile
      target: gui
      args:
        BUILD_VERSION: ${GUI_VERSION:-1.12.0}
    image: ghcr.io/kissesses/kms-gui:${GUI_VERSION:-1.12.0}
    depends_on:
      kms:
        condition: service_healthy
    environment:
      TZ: ${TZ:-UTC}
      INTERNET_MODE: ${INTERNET_MODE:-false}
      NGINX_ENABLED: ${NGINX_ENABLED:-true}
      NGINX_PORT: "80"
      NGINX_BASIC_AUTH_USER: ${NGINX_BASIC_AUTH_USER:-}
      NGINX_BASIC_AUTH_PASS: ${NGINX_BASIC_AUTH_PASS:-}
      NGINX_TLS_ENABLED: ${NGINX_TLS_ENABLED:-false}
      GUI_AUTH_ENABLED: ${GUI_AUTH_ENABLED:-false}
      GUI_API_TOKEN: ${GUI_API_TOKEN:-}
      API_AUTH_REQUIRED: ${API_AUTH_REQUIRED:-false}
      API_PUBLIC: ${API_PUBLIC:-false}
      OPS_DOCKER_ENABLED: ${OPS_DOCKER_ENABLED:-false}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      ADMIN_PUBLIC: ${ADMIN_PUBLIC:-false}
      KEYS_PUBLIC: ${KEYS_PUBLIC:-true}
      GUI_DEFAULT_LANG: ${GUI_DEFAULT_LANG:-en}
      DEBUG: ${DEBUG:-}
      GUNICORN_PRELOAD: ${GUNICORN_PRELOAD:-false}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-300}
      GUNICORN_MAX_REQUESTS: ${GUNICORN_MAX_REQUESTS:-0}
    volumes:
      - kms-data:/kms/var
      - ${TLS_CERT_DIR:-./certs}:/etc/nginx/certs:ro
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:ro
    ports:
      - "${GUI_BIND:-127.0.0.1}:${GUI_HTTP_PORT:-80}:80/tcp"
      - "${GUI_BIND:-127.0.0.1}:${GUI_TLS_PORT:-443}:443/tcp"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 90s
    security_opt:
      - no-new-privileges:true

volumes:
  kms-data:
