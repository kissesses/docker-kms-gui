name: kms

services:
  kms:
    build:
      context: .
      dockerfile: Dockerfile
      target: kms
      args:
        BUILD_VERSION: ${KMS_VERSION:-1.10.0}
    image: ghcr.io/kissesses/kms:${KMS_VERSION:-1.10.0}
    environment:
      TZ: ${TZ:-UTC}
      LOGLEVEL: ${KMS_LOGLEVEL:-INFO}
      IP: 0.0.0.0
      PORT: 1688
      CLIENT_COUNT: ${KMS_CLIENT_COUNT:-26}
      ACTIVATION_INTERVAL: ${KMS_ACTIVATION_INTERVAL:-120}
      RENEWAL_INTERVAL: ${KMS_RENEWAL_INTERVAL:-10080}
      HWID: ${KMS_HWID:-RANDOM}
    volumes:
      - kms-data:/kms/var
    ports:
      - "${KMS_BIND:-127.0.0.1}:${KMS_PORT:-1688}:1688/tcp"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "pykms_Server.py"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  gui:
    build:
      context: .
      dockerfile: Dockerfile
      target: gui
      args:
        BUILD_VERSION: ${GUI_VERSION:-1.10.0}
    image: ghcr.io/kissesses/kms-gui:${GUI_VERSION:-1.10.0}
    depends_on:
      kms:
        condition: service_healthy
    environment:
      TZ: ${TZ:-UTC}
      NGINX_ENABLED: ${NGINX_ENABLED:-true}
      NGINX_PORT: "80"
      NGINX_BASIC_AUTH_USER: ${NGINX_BASIC_AUTH_USER:-}
      NGINX_BASIC_AUTH_PASS: ${NGINX_BASIC_AUTH_PASS:-}
      NGINX_TLS_ENABLED: ${NGINX_TLS_ENABLED:-false}
      GUI_AUTH_ENABLED: ${GUI_AUTH_ENABLED:-false}
      API_AUTH_REQUIRED: ${API_AUTH_REQUIRED:-false}
      OPS_DOCKER_ENABLED: ${OPS_DOCKER_ENABLED:-false}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      ADMIN_PUBLIC: ${ADMIN_PUBLIC:-false}
      DEBUG: ${DEBUG:-}
    volumes:
      - kms-data:/kms/var
      - ${TLS_CERT_DIR:-./certs}:/etc/nginx/certs:ro
    ports:
      - "${GUI_BIND:-127.0.0.1}:${GUI_PORT:-80}:80/tcp"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 90s

volumes:
  kms-data:
