name: kms-sidecar

services:
  kms:
    build:
      context: .
      dockerfile: Dockerfile.kms
      args:
        BUILD_VERSION: ${KMS_VERSION:-1.5.0}
    image: ghcr.io/kissesses/kms:${KMS_VERSION:-1.5.0}
    environment:
      TZ: ${TZ:-UTC}
      LOGLEVEL: ${KMS_LOGLEVEL:-INFO}
    volumes:
      - kms-data:/kms/var
    ports:
      - "${KMS_PORT:-1688}:1688/tcp"
    restart: unless-stopped

  gui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_VERSION: ${GUI_VERSION:-1.5.0}
    image: ghcr.io/kissesses/kms-gui:${GUI_VERSION:-1.5.0}
    depends_on:
      kms:
        condition: service_healthy
    environment:
      TZ: ${TZ:-UTC}
      NGINX_ENABLED: "false"
      GUNICORN_BIND: 0.0.0.0:8080
    volumes:
      - kms-data:/kms/var
    expose:
      - "8080"
    restart: unless-stopped

  nginx:
    image: nginx:1.30.2-alpine
    depends_on:
      gui:
        condition: service_healthy
    volumes:
      - ./nginx/sidecar.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${GUI_PORT:-3000}:80/tcp"
    restart: unless-stopped

volumes:
  kms-data:
